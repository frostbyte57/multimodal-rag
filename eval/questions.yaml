# Evaluation set: engineer questions with expected sources.
#
# Each item:
#   id            unique key
#   question      the user query
#   filters       optional metadata filters {part_family, doc_type, version}
#   pin_version   optional explicit revision pin
#   expect        list of expected sources {doc, section, version?}; a retrieval
#                 is a "hit" if any expected source appears in the top-k chunks.
#   expect_unsupported: true  for questions that SHOULD have no grounded answer
#
# Metrics computed by eval/eval.py:
#   - retrieval recall@k   (did an expected source make the top-k?)
#   - citation accuracy    (did the answer cite an expected source?)

- id: gtp_max_rate
  question: "What is the maximum GTP transceiver line rate on the Artix-7 XC7A35T?"
  expect:
    - {doc: DS181, section: "2.1", version: v1.8}
  notes: "Revision conflict: v1.8 says 6.6 Gb/s, v1.5 says 3.75. Must prefer v1.8."

- id: gtp_max_rate_pinned
  question: "What was the maximum GTP line rate in the v1.5 Artix-7 datasheet?"
  pin_version: v1.5
  expect:
    - {doc: DS181, section: "2.1", version: v1.5}
  notes: "User explicitly pins an older revision."

- id: gtp_min_rate
  question: "What is the minimum supported GTP line rate on Artix-7?"
  expect:
    - {doc: DS181, section: "2.1"}

- id: gtp_refclk_freq
