services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: multimodal_rag
    environment:
      POSTGRES_DB: mmrag
      POSTGRES_USER: mmrag
      POSTGRES_PASSWORD: mmrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmrag -d mmrag"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
